providers:
  groq:
    enabled: true
    priority: 1
    use_for: ["fast", "chat"]
  gemini:
    enabled: true
    priority: 2
    use_for: ["long_context", "multimodal"]
  deepseek:
    enabled: true
    priority: 3
    use_for: ["code", "reasoning"]
  together:
    enabled: true
    priority: 4
    use_for: ["chat", "fast"]
  openrouter:
    enabled: true
    priority: 5
    use_for: ["fallback"]
  huggingface:
    enabled: true
    priority: 6
    use_for: ["specialized_models"]
  cohere:
    enabled: true
    priority: 7
    use_for: ["embedding", "rag"]
  cloudflare:
    enabled: false
    priority: 8
    use_for: ["edge", "low_latency"]
  ollama:
    enabled: true
    priority: 9
    use_for: ["offline", "local"]

routing:
  strategy: smart
  task_detection: true
  auto_fallback: true
  max_retries_per_provider: 2

limits:
  max_input_tokens: 6000
  max_output_tokens: 2000
  session_token_budget: 100000
  session_api_call_budget: 500

security:
  allowed_directories: ["."]
  sensitive_paths: ["~/.ssh", "~/.aws", "/etc/shadow"]
  require_confirmation: true
  tool_timeout_sec: 15
